<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Profesor</title>
  <link rel="stylesheet" href="profesor.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<header style="display:flex;align-items:center;justify-content:space-between;background-color:#000032;color:#fff;padding:10px 20px;">
  <!-- Isologo -->
  <div class="logo">
    <img src="isologo.png" alt="Isologo" style="height:40px;">
  </div>

  <!-- Título centrado -->
  <h1 style="flex:1;text-align:center;margin:0;font-size:30px;color:#fff;">Panel docente</h1>

  <!-- Logout -->
  <button onclick="window.location.href='index.html'" style="background:none;border:none;cursor:pointer;color:#fff;">
    <i data-lucide="log-out"></i>
  </button>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</header>
<body>
  <div class="container">
    <h2>Evaluaciones creadas</h2>
    <ul id="lista-evaluaciones"></ul>
    <button id="crear" class="btn btn-green">Crear nueva evaluación</button>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { collection, getDocs, query, where, doc, addDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const listaEl = document.getElementById("lista-evaluaciones");
    let currentUid = null;

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "login.html"; // redirige si no está logueado
      } else {
        currentUid = user.uid;
        cargarEvaluaciones(user.uid);
      }
    });

    async function cargarEvaluaciones(uid) {
      listaEl.innerHTML = "";

      const q = query(collection(db, "evaluaciones"), where("owner", "==", uid));
      const snapshot = await getDocs(q);

      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const li = document.createElement("li");
        li.className = "item";
        li.innerHTML = `
          <button onclick="window.togglePrivada('${docSnap.id}', ${data.privada})">
            <i data-lucide="${data.privada ? 'eye-off' : 'eye'}"></i>
          </button>
          <strong>${data.nombre || docSnap.id}</strong>
          <div class="botones-grid">
            <button onclick="window.location.href='evaluacion.html?id=${docSnap.id}'"><i data-lucide="play"></i></button>
            <button onclick="window.editarEvaluacion('${docSnap.id}')"><i data-lucide="edit"></i></button>
            <button onclick="window.duplicarEvaluacion('${docSnap.id}')"><i data-lucide="copy"></i></button>
            <button onclick="window.eliminarEvaluacion('${docSnap.id}')"><i data-lucide="trash-2"></i></button>
          </div>
        `;
        listaEl.appendChild(li);
      });

      window.lucide.createIcons();
    }

    window.editarEvaluacion = (id) => {
      window.location.href = `editar.html?id=${id}`;
    };

    window.duplicarEvaluacion = async (id) => {
      const ref = doc(db, "evaluaciones", id);
      const snap = await getDocs(collection(db, "evaluaciones"));
      const original = snap.docs.find(d => d.id === id);
      if (!original) return;
      const data = original.data();

      await addDoc(collection(db, "evaluaciones"), {
        nombre: "Copia de " + data.nombre,
        listaEstudiantes: data.listaEstudiantes,
        metodoEvaluacion: data.metodoEvaluacion,
        actual: 0,
        rechazadosPrimeraVuelta: [],
        segundaVuelta: [],
        reprobados: [],
        finalizada: false,
        owner: currentUid
      });

      alert("✅ Evaluación duplicada correctamente.");
      if (currentUid) cargarEvaluaciones(currentUid);
    };

    window.eliminarEvaluacion = async (id) => {
      if (!confirm("¿Estás seguro de que quieres eliminar esta evaluación?")) return; 
      await deleteDoc(doc(db, "evaluaciones", id));
      if (currentUid) cargarEvaluaciones(currentUid);
    };

    window.togglePrivada = async (id, estadoActual) => {
      await updateDoc(doc(db, "evaluaciones", id), { privada: !estadoActual });
      cargarEvaluaciones(currentUid); // refresca lista
    };

    document.getElementById("crear").onclick = () => {
      window.location.href = "crear.html";
    };
  </script>
</body>
</html>
