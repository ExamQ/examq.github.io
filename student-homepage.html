<!DOCTYPE html>
<html>
<head>
  <title>Evaluaciones disponibles</title>
  <link rel="stylesheet" href="student-homepage.css">
</head>
<body>
  <div class="container">
    <h1>Evaluaciones disponibles</h1>
    <ul id="lista-evaluaciones"></ul>
  </div>

  <script type="module">
    import { db } from "./firebase.js";
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const listaEl = document.getElementById("lista-evaluaciones");

    async function cargarEvaluaciones() {
      listaEl.innerHTML = "";
      const snapshot = await getDocs(collection(db, "evaluaciones"));
      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const li = document.createElement("li");
        li.className = "item";

        const nombre = document.createElement("span");
        nombre.textContent = data.nombre || docSnap.id;
        nombre.className = "nombre";

        const abrir = document.createElement("button");
        abrir.textContent = "Abrir";
        abrir.className = "btn btn-green";
        abrir.onclick = () => {
          window.location.href = `index.html?id=${docSnap.id}`;
        };

        li.appendChild(nombre);
        li.appendChild(abrir);
        listaEl.appendChild(li);
      });
    }

    cargarEvaluaciones();
  </script>
</body>
</html>
