<!DOCTYPE html>
<html>
<head>
  <title>Login Profesor</title>
</head>
<body>
  <h1>Ingreso al Panel</h1>
  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">
  <button id="login">Ingresar</button>
  <button id="registro">Registrarse</button>
  <div id="estado"></div>

<script type="module">
  import { auth } from "./firebase.js";
  import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

  const estadoEl = document.getElementById("estado");

  document.getElementById("login").onclick = async () => {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      estadoEl.innerText = "✅ Ingreso exitoso";
      window.location.href = "homepage.html";
    } catch (e) {
      estadoEl.innerText = "❌ Error: " + e.message;
    }
  };

  document.getElementById("registro").onclick = async () => {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;
    try {
      await createUserWithEmailAndPassword(auth, email, pass);
      estadoEl.innerText = "✅ Registro exitoso";
      window.location.href = "homepage.html";
    } catch (e) {
      estadoEl.innerText = "❌ Error: " + e.message;
    }
  };
</script>
</body>
</html>
