<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tracking Evaluación</title>
  <link rel="stylesheet" href="tracking.css">
</head>

<header style="display:flex;align-items:center;justify-content:space-between;background-color:#000032;color:#fff;padding:10px 20px;">
  <!-- Isologo -->
  <div class="logo">
    <img src="isologo.png" alt="Isologo" style="height:40px;">
  </div>

  <!-- Nombre de la evaluación centrado -->
  <h1 id="eval-title" style="flex:1;text-align:center;margin:0;font-size:20px;color:#fff;"></h1>

  <!-- Botón volver -->
  <button onclick="window.location.href='estudiante.html'" style="background:none;border:1px solid #fff;border-radius:4px;width:40px;height:40px;cursor:pointer;color:#fff;">
    <i data-lucide="arrow-left"></i>
  </button>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    // Render icons
    lucide.createIcons();
    // Leer nombre desde querystring
    const queryParams = new URLSearchParams(window.location.search);
    document.getElementById("eval-title").textContent = queryParams.get("nombre") || "Evaluación";
  </script>
</header>


<body>
  <!-- Header reservado -->
  <header id="header"></header>

  <!-- Contenedor principal -->
  <!-- Usa la clase no-segunda si el método es "un-llamado" -->
  <div class="grid-container">
    <!-- Estudiante actual -->
    <div id="actual" class="box actual">
      <h3>Actual</h3>
      <div id="actual-content">Estudiante actual</div>
    </div>

    <!-- Siguiente -->
    <div id="siguiente" class="box siguiente">
      <h3>Siguiente</h3>
      <div id="siguiente-content">Próximo estudiante</div>
    </div>

    <!-- Segunda vuelta -->
    <div id="segunda-vuelta" class="box segunda-vuelta">
      <h3>Segunda vuelta</h3>
      <div id="segunda-content">0</div>
    </div>

    <!-- Próximos -->
    <div id="proximos" class="box proximos">
      <h3>Próximos</h3>
      <div id="proximos-content">Lista de próximos</div>
    </div>

    <!-- Restantes -->
    <div id="restantes" class="box restantes">
      <h3>Restantes</h3>
      <div id="restantes-content">Quedan 0</div>
    </div>
  </div>

  <div id="pause-overlay" class="pause-overlay" hidden>
    <div id="pause-message" class="pause-message">⏸️ Evaluación pausada</div>
  </div>

  <script type="module">
    import { db } from "./firebase.js";
    import { doc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const evalId = params.get("id");
    const ref = doc(db, "evaluaciones", evalId);
    const grid = document.querySelector(".grid-container");
    const pauseOverlay = document.getElementById("pause-overlay");
    const pauseMessage = document.getElementById("pause-message");

    function actualizarVista(data) {
      const lista = Array.isArray(data.listaEstudiantes) ? data.listaEstudiantes : [];
      const indice = Number.isFinite(data.actual) ? data.actual : 0;
      const isPaused = data.pausada === true;
      const pausaMensaje = data.mensajePausa || "Evaluación pausada";

      if (isPaused) {
        grid.style.display = "none";
        pauseOverlay.hidden = false;
        pauseOverlay.style.display = "flex";
        pauseMessage.innerText = pausaMensaje;
        return;
      }

      grid.style.display = "grid";
      pauseOverlay.hidden = true;
      pauseOverlay.style.display = "none";
      pauseMessage.innerText = "";

      document.getElementById("actual-content").innerText =
        lista[indice] || "Nadie en turno";
      document.getElementById("siguiente-content").innerText =
        lista[indice + 1] || "Sin siguiente";

      const proximos = lista.slice(indice + 2, indice + 6);
      document.getElementById("proximos-content").innerHTML =
        proximos.map(n => `<div>${n}</div>`).join("") || "Sin próximos";

      const restantes = Math.max(lista.length - (indice + 1), 0);
      document.getElementById("restantes-content").innerText = `Quedan ${restantes}`;

      if (data.metodoEvaluacion === "doble-llamado") {
        grid.classList.remove("no-segunda");
        document.getElementById("segunda-vuelta").style.display = "block";
        document.getElementById("segunda-content").innerText =
          (Array.isArray(data.segundaVuelta) ? data.segundaVuelta.length : 0);
      } else {
        grid.classList.add("no-segunda");
        document.getElementById("segunda-vuelta").style.display = "none";
      }
    }

    onSnapshot(ref, (snap) => {
      if (!snap.exists()) return;
      actualizarVista(snap.data());
    });
  </script>
</body>
</html>
