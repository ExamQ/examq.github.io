<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Evaluación</title>
  <link rel="stylesheet" href="crear.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<header style="display:flex;align-items:center;justify-content:space-between;background-color:#000032;color:#fff;padding:10px 20px;">
  <div class="logo">
    <img src="isologo.png" alt="Isologo" style="height:40px;">
  </div>
  <h1 style="flex:1;text-align:center;margin:0;font-size:20px;color:#fff;">Crear nueva evaluación</h1>
  <button onclick="window.location.href='index.html'" style="background:none;border:none;cursor:pointer;color:#fff;">
    <i data-lucide="log-out"></i>
  </button>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</header>

<body>
  <div class="container">
    <!-- Header incluirá el título -->

    <!-- Nombre y ShortID -->
    <label for="nombreEval">Nombre de la evaluación:</label>
    <input type="text" id="nombreEval" placeholder="Ej: Examen Oral Matemáticas">

    <label for="shortId">Código para estudiantes (ShortID):</label>
    <input type="text" id="shortId" placeholder="ej: mat2026" pattern="[a-z0-9]{4,12}" title="4-12 caracteres, solo letras minúsculas y números">

    <!-- Lista manual -->
    <label for="listaManual">Lista de estudiantes (un estudiante por línea):</label>
    <textarea id="listaManual" rows="6" placeholder="Ej: Ana\nPedro\nMaría"></textarea>

    <!-- Subir lista -->
    <label for="archivoLista">Subir lista de estudiantes (CSV/XLSX):</label>
    <input type="file" id="archivoLista" accept=".csv,.xlsx">

    <!-- Método de evaluación -->
    <div class="metodo">
      <div class="col-izq">
        <h3>Método obligatorio</h3>
        <label><input type="radio" name="metodo" value="un-llamado" checked> Un llamado</label><br>
        <label><input type="radio" name="metodo" value="doble-llamado"> Doble llamado</label>
      </div>
      <div class="col-der">
        <h3>Opciones adicionales</h3>
        <label><input type="checkbox" id="intercalar"> Intercalar inicio y final</label><br>
        <label><input type="checkbox" id="voluntarios"> Lista de voluntarios</label><br>
        <textarea id="voluntariosBox" rows="4" placeholder="Un voluntario por línea" style="display:none;"></textarea><br>
        <label><input type="checkbox" id="aleatorizar"> Aleatorizar lista</label>
      </div>
    </div>

    <!-- Botón guardar -->
    <button id="guardar" class="btn btn-green"><i data-lucide="save"></i> Guardar evaluación</button>
    <button id="volver" class="btn btn-blue"><i data-lucide="arrow-left"></i> Volver al inicio</button>

    <div id="estado"></div>

    <!-- Vista previa -->
    <div id="preview" style="display:none;">
      <h2>Vista previa de la lista</h2>
      <p><strong>Nombre:</strong> <span id="preview-nombre"></span></p>
      <p><strong>Código:</strong> <span id="preview-shortId"></span></p>
      <p><strong>Método:</strong> <span id="preview-metodo"></span></p>
      <ul id="preview-list"></ul>
      <button id="confirmar" class="btn btn-green"><i data-lucide="check"></i> Confirmar</button>
      <button id="editar" class="btn btn-orange"><i data-lucide="edit"></i> Editar</button>
    </div>
  </div>

  <script type="module">
    import { auth, db } from "./firebase.js";
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import * as XLSX from "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm";

    const guardarBtn = document.getElementById("guardar");
    const confirmarBtn = document.getElementById("confirmar");
    const editarBtn = document.getElementById("editar");
    const estadoEl = document.getElementById("estado");

    let listaFinal = [];

    // Mostrar/ocultar textbox de voluntarios
    document.getElementById("voluntarios").addEventListener("change", (e) => {
      document.getElementById("voluntariosBox").style.display = e.target.checked ? "block" : "none";
    });

    // Procesar archivo CSV/XLSX
    async function procesarArchivo(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const data = new Uint8Array(e.target.result);
          const workbook = XLSX.read(data, { type: "array" });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
          const nombres = rows.flat().map(s => String(s).trim()).filter(s => s);
          resolve(nombres);
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
      });
    }

    // Intercalar inicio y final
    function intercalarLista(lista) {
      const resultado = [];
      let i = 0;
      let j = lista.length - 1;
      while (i <= j) {
        if (i === j) {
          resultado.push(lista[i]);
        } else {
          resultado.push(lista[i]);
          resultado.push(lista[j]);
        }
        i++;
        j--;
      }
      return resultado;
    }

    // Aplicar voluntarios
    function aplicarVoluntarios(lista, voluntarios) {
      const setVol = new Set(voluntarios);
      const resto = lista.filter(est => !setVol.has(est));
      return [...voluntarios, ...resto];
    }

    function generarShortId() {
      const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
      let id = "";
      for (let i = 0; i < 6; i++) {
        id += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return id;
    }

    guardarBtn.onclick = async () => {
      const nombre = document.getElementById("nombreEval").value.trim();
      let shortId = document.getElementById("shortId").value.trim();
      if (!shortId) {
        shortId = generarShortId();
        document.getElementById("shortId").value = shortId;
      }
      const metodo = document.querySelector("input[name='metodo']:checked").value;
      const intercalar = document.getElementById("intercalar").checked;
      const voluntariosChecked = document.getElementById("voluntarios").checked;
      const aleatorizar = document.getElementById("aleatorizar").checked;

      // Lista manual
      let listaManual = document.getElementById("listaManual").value.split("\n").map(s => s.trim()).filter(s => s);

      // Lista archivo
      let listaArchivo = [];
      const file = document.getElementById("archivoLista").files[0];
      if (file) {
        listaArchivo = await procesarArchivo(file);
      }

      // Combinar listas
      listaFinal = [...listaManual, ...listaArchivo];

      // Voluntarios
      if (voluntariosChecked) {
        const voluntariosLista = document.getElementById("voluntariosBox").value.split("\n").map(s => s.trim()).filter(s => s);
        listaFinal = aplicarVoluntarios(listaFinal, voluntariosLista);
      }

      // Intercalar
      if (intercalar) {
        listaFinal = intercalarLista(listaFinal);
      }

      // Aleatorizar
      if (aleatorizar) {
        listaFinal = listaFinal.sort(() => Math.random() - 0.5);
      }

      // Vista previa
      document.getElementById("preview-nombre").innerText = nombre;
      document.getElementById("preview-shortId").innerText = shortId;
      document.getElementById("preview-metodo").innerText = metodo;
      const ul = document.getElementById("preview-list");
      ul.innerHTML = "";
      listaFinal.forEach(est => {
        const li = document.createElement("li");
        li.innerText = est;
        ul.appendChild(li);
      });

      document.getElementById("preview").style.display = "block";
      estadoEl.innerText = "";
    };

    confirmarBtn.onclick = async () => {
      try {
        await addDoc(collection(db, "evaluaciones"), {
          nombre: document.getElementById("nombreEval").value.trim(),
          shortId: document.getElementById("shortId").value.trim(),
          listaEstudiantes: listaFinal,
          listaOriginal: listaFinal,
          metodoEvaluacion: document.querySelector("input[name='metodo']:checked").value,
          intercalar: document.getElementById("intercalar").checked,
          voluntarios: document.getElementById("voluntarios").checked,
          aleatorizar: document.getElementById("aleatorizar").checked,
          actual: 0,
          rechazadosPrimeraVuelta: [],
          segundaVuelta: [],
          reprobados: [],
          finalizada: false,
          privada: true,
          owner: auth.currentUser.uid
        });
        estadoEl.innerText = "✅ Evaluación creada correctamente.";
        window.location.href = "profesor.html";
      } catch (e) {
        estadoEl.innerText = "❌ Error: " + e.message;
      }
    };

    editarBtn.onclick = () => {
      document.getElementById("preview").style.display = "none";
      estadoEl.innerText = "✏️ Puedes editar la información antes de guardar.";
      window.lucide.createIcons();
    };

    document.getElementById("volver").onclick = () => {
      window.location.href = "profesor.html";
    };

    window.lucide.createIcons();
  </script>
</body>
</html>
