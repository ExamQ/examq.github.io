<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Evaluación</title>
  <link rel="stylesheet" href="evaluacion.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="container">
    <!-- Título eliminado, será parte del header -->

    <div id="info"></div>
    <div id="display-profesor" class="display-profesor">
      <h2>Actual:</h2>
      <p id="prof-actual">---</p>

      <h2>Siguiente:</h2>
      <p id="prof-siguiente">---</p>

      <h2>Restantes:</h2>
      <p id="prof-restantes">---</p>
    </div>

    <!-- Controles principales -->
    <div class="botones-centrados" style="display:flex; flex-direction:column; align-items:center; gap:0rem;">
      <button id="siguiente" class="btn btn-green" style="width:80%;"><i data-lucide="arrow-right"></i> Siguiente estudiante</button>
      <button id="rechazo" class="btn btn-red" style="width:80%;"><i data-lucide="x-circle"></i> Marcar rechazo</button>
      <button id="segunda" class="btn btn-orange" style="display:none; width:80%;"><i data-lucide="refresh-cw"></i> Iniciar segunda vuelta</button>
      <button id="volver" class="btn btn-blue" style="width:80%;"><i data-lucide="arrow-left"></i> Volver al inicio</button>
      <button id="terminar" class="btn btn-gray" style="display:none; width:80%;"><i data-lucide="flag-checkered"></i> Terminar evaluación</button>
      <button id="descargar" class="btn btn-purple" style="display:none; width:80%;"><i data-lucide="download"></i> Descargar reprobados</button>
      <button id="pausar" class="btn-pausa" style="width:80%;"><i data-lucide="octagon-pause"></i> Pausar</button>
      <button id="reanudar" class="btn btn-green" style="display:none; width:80%;"><i data-lucide="play"></i> Reanudar</button>
    </div>

    <div class="pausa-input">
      <input type="text" id="mensajePausa" placeholder="Mensaje de pausa (ej: Volvemos a las 10:30, Pausa de almuerzo)" style="width:60%;">
      <button id="actualizarPausa"><i data-lucide="arrow-right"></i></button>
    </div>

    <div id="estado" class="estado"></div>
  </div>

   <!-- Script-->
<script type="module">
    import { db } from "./firebase.js";
    import { doc, getDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const params = new URLSearchParams(window.location.search);
    const evalId = params.get("id");
    const ref = doc(db, "evaluaciones", evalId);

    const segundaBtn = document.getElementById("segunda");
    const terminarBtn = document.getElementById("terminar");
    const descargarBtn = document.getElementById("descargar");
    const estadoEl = document.getElementById("estado");
    const infoEl = document.getElementById("info");
    const siguienteBtn = document.getElementById("siguiente");
    const rechazoBtn = document.getElementById("rechazo");

    function renderLucideIcons() {
      if (window.lucide && typeof window.lucide.createIcons === "function") {
        window.lucide.createIcons();
      }
    }

    // 🔎 Escuchar cambios en tiempo real
    onSnapshot(ref, (snap) => {
        if (!snap.exists()) return;
        const data = snap.data();

        infoEl.innerHTML = `<h2>${data.nombre}</h2><p>Método: ${data.metodoEvaluacion}</p>`;

        // Si evaluación pausada
        if (data.pausada) {
          document.getElementById("prof-actual").innerHTML = `<i data-lucide='octagon-pause'></i> Evaluación pausada: ${data.mensajePausa}`;
          document.getElementById("prof-siguiente").innerText = "-";
          document.getElementById("prof-restantes").innerText = "-";
          estadoEl.innerHTML = "<i data-lucide='octagon-pause'></i> Evaluación pausada.";
          renderLucideIcons();
          document.getElementById("pausar").style.display = "none";
          document.getElementById("reanudar").style.display = "inline-block";
          return; // detenemos aquí para no mostrar estudiantes
        } else {
          document.getElementById("pausar").style.display = "inline-block";
          document.getElementById("reanudar").style.display = "none";
        }

        // Si evaluación finalizada
        if (data.finalizada) {
            siguienteBtn.disabled = true;
            rechazoBtn.disabled = true;
            segundaBtn.style.display = "none";
            terminarBtn.style.display = "none";
            descargarBtn.style.display = "block";
            estadoEl.innerText = "🏁 Evaluación finalizada. Puedes descargar la lista de reprobados.";
            document.getElementById("prof-actual").innerText = "Evaluación terminada";
            document.getElementById("prof-siguiente").innerText = "-";
            document.getElementById("prof-restantes").innerText = "0";
            return;
        }
        // Mostrar botón de segunda vuelta en modo doble-llamado
        if (data.metodoEvaluacion === "doble-llamado" &&
                (data.rechazadosPrimeraVuelta || []).length > 0 &&
                (!data.segundaVuelta || data.segundaVuelta.length === 0)) {
            segundaBtn.style.display = "block";
        } else {
            segundaBtn.style.display = "none";
        }

        // Control de fin de lista
        const listaActual = data.listaEstudiantes || [];
        const indice = data.actual || 0;

        const actualEst = listaActual[indice] || "Ninguno";
        const siguienteEst = listaActual[indice + 1] || "Ninguno";
        const restantes = Math.max(listaActual.length - (indice + 1), 0);

        document.getElementById("prof-actual").innerText = actualEst;
        document.getElementById("prof-siguiente").innerText = siguienteEst;
        document.getElementById("prof-restantes").innerText = restantes;

        if (indice >= listaActual.length) {
            siguienteBtn.disabled = true;
            rechazoBtn.disabled = true;
            terminarBtn.style.display = "block";
        } else {
            siguienteBtn.disabled = false;
            rechazoBtn.disabled = false;
            terminarBtn.style.display = "none";
        }
    });

    // ➡️ Avanzar estudiante
    siguienteBtn.onclick = async () => {
        const snap = await getDoc(ref);
        if (!snap.exists()) return;
        const data = snap.data();

        await updateDoc(ref, { actual: data.actual + 1 });
        estadoEl.innerHTML = "<i data-lucide='arrow-right'></i> Avanzaste al siguiente estudiante.";
        window.lucide.createIcons();
    };

    // X Marcar rechazo
    rechazoBtn.onclick = async () => {
        const snap = await getDoc(ref);
        if (!snap.exists()) return;
        const data = snap.data();

        const estudianteActual = data.listaEstudiantes[data.actual];
        if (!estudianteActual) return;

        if (data.metodoEvaluacion === "un-llamado" || data.metodoEvaluacion === "voluntarios") {
            const nuevosReprobados = [...(data.reprobados || []), estudianteActual];
            await updateDoc(ref, { reprobados: nuevosReprobados, actual: data.actual + 1 });
        }

        if (data.metodoEvaluacion === "doble-llamado") {
            if ((data.segundaVuelta || []).length > 0) {
                const nuevosReprobados = [...(data.reprobados || []), estudianteActual];
                await updateDoc(ref, { reprobados: nuevosReprobados, actual: data.actual + 1 });
            } else {
                const nuevosRechazados = [...(data.rechazadosPrimeraVuelta || []), estudianteActual];
                await updateDoc(ref, { rechazadosPrimeraVuelta: nuevosRechazados, actual: data.actual + 1 });
            }
        }

        estadoEl.innerHTML = `<i data-lucide='x'></i> ${estudianteActual} marcado como rechazo.`;
        renderLucideIcons();
    };

    // 🔄 Iniciar segunda vuelta
    segundaBtn.onclick = async () => {
        const snap = await getDoc(ref);
        if (!snap.exists()) return;
        const data = snap.data();
        await updateDoc(ref, {
            listaEstudiantes: data.rechazadosPrimeraVuelta,
            segundaVuelta: data.rechazadosPrimeraVuelta,
            actual: 0,
            rechazadosPrimeraVuelta: []
        });
        estadoEl.innerHTML = "<i data-lucide='refresh-cw'></i> Segunda vuelta iniciada.";
        renderLucideIcons();
    };

    // 🏁 Terminar evaluación
    terminarBtn.onclick = async () => {
        await updateDoc(ref, { finalizada: true });
        estadoEl.innerHTML = "<i data-lucide='flag'></i> Evaluación finalizada.";
        renderLucideIcons();
    };

    // 📥 Descargar reprobados en TXT
    descargarBtn.onclick = async () => {
        const snap = await getDoc(ref);
        if (!snap.exists()) return;
        const data = snap.data();
        const reprobados = data.reprobados || [];

        let contenido = "Lista de reprobados\n-------------------\n";
        reprobados.forEach(nombre => {
            contenido += `${nombre}\n`;
        });

        const blob = new Blob([contenido], { type: "text/plain;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `reprobados_${data.nombre}.txt`;
        a.click();
        URL.revokeObjectURL(url);
    };

// ⏸️ Pausar evaluación (clic o Enter en el input)
const mensajeInput = document.getElementById("mensajePausa");

async function activarPausa() {
  const mensaje = mensajeInput.value || "Evaluación en pausa";
  await updateDoc(ref, { pausada: true, mensajePausa: mensaje });
  estadoEl.innerHTML = "<i data-lucide='octagon-pause'></i> Evaluación pausada.";
  renderLucideIcons();
  document.getElementById("pausar").style.display = "none";
  document.getElementById("reanudar").style.display = "inline-block";
}

// Clic en botón Pausar
document.getElementById("pausar").onclick = activarPausa;

// Enter en cuadro de mensaje
mensajeInput.addEventListener("keypress", async (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    await activarPausa();
  }
});

// ➡️ Botón para actualizar mensaje de pausa
document.getElementById("actualizarPausa").onclick = async () => {
  const mensaje = mensajeInput.value || "Evaluación en pausa";
  await updateDoc(ref, { pausada: true, mensajePausa: mensaje });
  estadoEl.innerHTML = "<i data-lucide='octagon-pause'></i> Mensaje de pausa actualizado.";
  renderLucideIcons();
};

// ▶️ Reanudar evaluación
document.getElementById("reanudar").onclick = async () => {
  await updateDoc(ref, { pausada: false, mensajePausa: "" });
  estadoEl.innerHTML = "<i data-lucide='play'></i> Evaluación reanudada.";
  renderLucideIcons();
  document.getElementById("pausar").style.display = "inline-block";
  document.getElementById("reanudar").style.display = "none";
  mensajeInput.value = ""; // limpiar el campo al reanudar
};

    // ⬅️ Volver al inicio
    document.getElementById("volver").onclick = () => {
        window.location.href = "profesor.html";
    };

    window.lucide.createIcons();
</script>
</body>
</html>
